# Issue #675: nightly extended fuzz + sanitizer stress (non-blocking on PRs).
# Issue #1933: LLVM source-based coverage artifact job.
name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  AURA_BUILD_JOBS: "0"
  AURA_TEST_JOBS: "4"
  CCACHE_DISABLE: 1

jobs:
  fuzz-extended:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/aura-ci:v1.0.1
    steps:
    - uses: actions/checkout@v7

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    - name: Build
      run: python3 build.py build

    - name: Extended fuzz (full corpus)
      run: |
        python3 tests/fuzz_corpus.py
        python3 tests/fuzz_equiv_mutate.py
        echo "✓ extended fuzz complete"

  tsan-smoke:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/aura-ci:v1.0.1
    steps:
    - uses: actions/checkout@v7

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    - name: Build with TSAN
      run: python3 build.py --sanitizer=tsan build

    - name: Run concurrent tests under TSAN
      env:
        TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"
      run: |
        python3 build.py --sanitizer=tsan test concurrent
        echo "✓ concurrent tests clean under TSAN"

  coverage:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    - name: Tooling smoke
      run: python3 build.py coverage --check-tools

    - name: Instrumented coverage report
      run: python3 build.py coverage --html --suite smoke
      continue-on-error: true

    - name: Upload coverage HTML/JSON
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: llvm-coverage
        path: build_coverage/coverage/
        if-no-files-found: warn
