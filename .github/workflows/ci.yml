# Aura CI — GitHub Actions
#
# Requirements:
#   GCC >= 16 (C++26 modules support)
#   CMake >= 4.0
#   Ninja >= 1.12
#
# Hosted runners don't yet provide GCC 16. This workflow is ready to
# run when a suitable container or self-hosted runner is configured.
#
# Usage with Docker:
#   docker run -v $(pwd):/workspace ghcr.io/cybrid-systems/aura-ci
#
# The image can be built from .github/Dockerfile.ci

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/aura-ci:latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure
      run: |
        cmake --version
        g++ --version
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --target aura -j$(nproc)

    - name: Quick smoke test
      run: echo '(+ 1 2 3)' | ./build/aura | grep -q 6

    - name: Full test suite (build + all tests)
      run: python3 build.py check
