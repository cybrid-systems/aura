# Aura CI — GitHub Actions
#
# Uses ghcr.io/cybrid-systems/dev:latest (GCC 16 + CMake 4.x + Ninja)

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure
      run: |
        cmake --version
        g++ --version
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --target aura -j$(nproc)

    - name: Quick smoke test
      run: echo '(+ 1 2 3)' | ./build/aura | grep -q 6

    - name: Clean rebuild for test suite
      run: |
        rm -rf build
        python3 build.py check
