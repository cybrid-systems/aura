# Aura CI

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:latest

    steps:
    - uses: actions/checkout@v4

    - name: Build & Test
      run: python3 build.py check
