# Aura CI — canonical workflow (Issue #1570 path map)
#
# THIS IS THE ONLY PR/main CI entrypoint.
# Nightly / release live beside this file: nightly.yml, release.yml.
#
# Wall-time layout (target):
#   PR:
#     gate (~1–2m) ──► build-test (~12–18m: build + core/safety/issues-fast + s0 + bench)
#     security-scan ── parallel from t=0 (no gate wait)
#   main (push):
#     same as PR, plus ubsan-smoke / asan / repro / deploy-health in parallel
#
# PR optimisations (2026-07):
#   - concurrency cancel-in-progress (superseded PR pushes)
#   - drop PR-side full rebuild jobs (s0-smoke + ubsan-smoke) — they duplicated
#     build-test wall time; s0 folded into build-test; ubsan is main-only
#   - security-scan no longer needs: [gate]
#   - gate: remove non-blocking clang-tidy (wasted wall + no signal)
#   - skip apt when mold/lld already on the image
#   - paths-filter: docs-only PRs run gate only (no full C++ build)
#
# Developer map: docs/test_harness_pattern.md
# Platforms: docs/ci-platforms.md (#1573)

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel superseded runs on the same PR / branch (big win on rapid pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  AURA_BUILD_TYPE: RelWithDebInfo
  AURA_BUILD_JOBS: "0"  # 0 → use all host CPUs in build.py
  AURA_TEST_JOBS: "4"
  AURA_ISSUES_JOBS: "4"
  # Cross-run ccache caused stale-object flakes; compile fresh every job.
  CCACHE_DISABLE: 1
  # Issue #873/#874 Phase 1
  AURA_USE_MOLD: "1"
  AURA_LINK_JOBS: "4"
  NINJA_STATUS: "[%f/%t %es] "
  # Issue #1569: hard benchmark SLO gate (regression → job fail)
  AURA_CI_STRICT_BENCH: "1"

jobs:
  # Cheap filter: docs/chore-only PRs skip the full C++ matrix.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
    - uses: actions/checkout@v7
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          code:
            - 'src/**'
            - 'tests/**'
            - 'lib/**'
            - 'cmake/**'
            - 'CMakeLists.txt'
            - 'build.py'
            - 'requirements-dev.txt'
            - '.github/workflows/ci.yml'
            - 'scripts/**'
            - 'contracts'
            - '.clang-format'
            - '.clang-tidy'

  gate:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-dev-v1.0.4-${{ hashFiles('requirements-dev.txt') }}

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    # gate = docs --check + ruff + clang-format + fixtures + surface audits.
    - name: Static checks (docs + lint + format + fixtures)
      run: python3 build.py gate

    # Aura philosophy guard: no per-issue plan docs in docs/design/
    - name: "Aura philosophy guard: no docs/design/"
      run: |
        if find docs/design -type f -name '*.md' 2>/dev/null | grep -q .; then
          echo "❌ docs/design/ files exist in working tree — aura philosophy forbids per-issue plan docs" >&2
          find docs/design -type f -name '*.md' | head -10 >&2
          echo "Hint: rm -rf docs/design && git add -A && git commit -m 'chore(docs): remove docs/design/ (aura philosophy)'" >&2
          exit 1
        fi
        echo "aura philosophy guard clean (no docs/design/ files)"

  build-test:
    needs: [gate, changes]
    # Full matrix only when C++/tests/build surface changed (or on main push).
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-dev-v1.0.4-${{ hashFiles('requirements-dev.txt') }}

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    # Fast linker: only apt if missing (image usually ships one).
    - name: Ensure mold / lld
      run: |
        set -e
        need_apt=0
        command -v mold >/dev/null 2>&1 || need_apt=1
        command -v ld.lld >/dev/null 2>&1 || need_apt=1
        if [ "$need_apt" = 1 ]; then
          apt-get update -qq
          command -v mold >/dev/null 2>&1 || apt-get install -y -qq mold || echo "::warning::mold not installed"
          command -v ld.lld >/dev/null 2>&1 || apt-get install -y -qq lld || echo "::warning::lld not installed"
        fi
        command -v mold >/dev/null 2>&1 && mold --version || true
        command -v ld.lld >/dev/null 2>&1 && ld.lld --version | head -1 || true

    - name: Build & Test
      env:
        AURA_ISSUES_TIER: ${{ github.event_name == 'pull_request' && 'fast' || 'full' }}
        AURA_GIT_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
        AURA_RUNTIME_DIR: ${{ github.workspace }}
      run: python3 build.py ci

    # Was a separate s0-smoke job that rebuilt the entire tree (~10–15m).
    # Folded here: reuse the same build/ (seconds, not a second full link).
    - name: Suite s0 surface smoke
      env:
        AURA_RUNTIME_DIR: ${{ github.workspace }}
      run: python3 build.py test suite-s0

    - name: "engine:metrics under s0"
      env:
        AURA_PRIMITIVES: s0
        AURA_RUNTIME_DIR: ${{ github.workspace }}
      run: |
        printf '%s\n' \
          '(define m (engine:metrics))' \
          '(unless (hash? m) (error "engine:metrics not hash"))' \
          '(unless (= 2 (hash-ref m "schema")) (error "schema"))' \
          '(display "s0 engine:metrics ok")' \
          '(newline)' \
          | ./build/aura

    # Issue #1569: hard SLO gate for compiler pipeline benchmarks.
    - name: Benchmark SLO gate (#1569)
      env:
        AURA_RUNTIME_DIR: ${{ github.workspace }}
        AURA_CI_STRICT_BENCH: "1"
      run: python3 build.py bench --strict

  # ASAN track — main only (saves ~8–10m on PRs; PR gate is build-test).
  asan-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    - name: Build with ASAN
      run: python3 build.py --sanitizer=asan build

    - name: Upload ASAN binaries
      uses: actions/upload-artifact@v7
      with:
        name: asan-binaries
        path: |
          build_asan/aura
          build_asan/test_ir
        if-no-files-found: error
        retention-days: 1

  asan-verify:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [asan-build]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - name: Download ASAN binaries
      uses: actions/download-artifact@v8
      with:
        name: asan-binaries
        path: build_asan

    - name: Restore executable bit
      run: chmod +x build_asan/aura build_asan/test_ir

    - name: Multi-session leak test
      run: |
        set +e
        ASAN_OPTIONS=detect_leaks=1:abort_on_error=0:print_stacktrace=1:exitcode=42 \
          timeout 120 ./build_asan/aura < tests/multi_session_leak_test.aura \
          > /tmp/asan-multi-session.log 2>&1
        rc=$?
        set -e
        cat /tmp/asan-multi-session.log
        if ! grep -q "✅ PASS" /tmp/asan-multi-session.log; then
          echo "::error::multi-session leak test FAILED (functional)"
          exit 1
        fi
        if [ "$rc" -ne 0 ]; then
          summary=$(grep "SUMMARY: AddressSanitizer" /tmp/asan-multi-session.log | tail -1)
          echo "::error::ASAN leak detected: $summary"
          grep "Direct leak of" /tmp/asan-multi-session.log | head -10
          exit 1
        fi
        echo "✓ No ASAN leaks detected"

    - name: Run unit tests (test_ir) under ASAN
      env:
        ASAN_OPTIONS: "detect_leaks=0:abort_on_error=1:print_stacktrace=1:halt_on_error=1"
      run: |
        python3 build.py --sanitizer=asan test unit
        echo "✓ unit tests clean under ASAN"

    - name: Run emit-binary suite (bash) under ASAN
      env:
        ASAN_OPTIONS: "detect_leaks=0:abort_on_error=1:print_stacktrace=1:halt_on_error=1"
      run: |
        AURA=$(pwd)/build_asan/aura bash tests/run-tests.sh
        echo "✓ emit-binary suite clean under ASAN"

  # UBSAN: main only (full rebuild was doubling PR wall time vs build-test).
  ubsan-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [gate]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-dev-v1.0.4-${{ hashFiles('requirements-dev.txt') }}

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    - name: Build with UBSAN
      run: python3 build.py --sanitizer=ubsan build

    - name: Run unit tests under UBSAN
      env:
        UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
      run: |
        python3 build.py --sanitizer=ubsan test unit
        echo "✓ unit tests clean under UBSAN"

  # Security scan starts immediately (no gate dependency) — overlaps with gate.
  security-scan:
    needs: [changes]
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-dev-v1.0.4-${{ hashFiles('requirements-dev.txt') }}

    - uses: actions/cache@v6
      with:
        path: ~/.cache/trivy
        key: trivy-db-${{ runner.os }}-v0.72.0
        restore-keys: trivy-db-${{ runner.os }}-

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    - name: Install Trivy
      run: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b /usr/local/bin v0.72.0

    - name: Security scan
      run: python3 build.py security

    - name: Generate SBOM
      run: python3 build.py sbom --version=ci-${{ github.sha }}

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v7
      with:
        name: aura-sbom
        path: dist/aura-sbom.json
        if-no-files-found: error
        retention-days: 30

  # Issue #675: dual reproducible Release build verification (main only).
  reproducible-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [gate]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    env:
      SOURCE_DATE_EPOCH: "1704067200"
      CCACHE_DISABLE: 1
    steps:
    - uses: actions/checkout@v7

    - uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-dev-v1.0.4-${{ hashFiles('requirements-dev.txt') }}

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    - name: Verify reproducible builds match
      run: python3 build.py repro --verify

  # Issue #677: health endpoint smoke (main only).
  deployment-health:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [gate]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    # Issue #677 C++ test folded into test_obs_metrics_smoke_batch (wave 57 / #1957).
    # This job only smokes the HTTP health surface on main.
    - name: Build aura
      run: |
        set -euo pipefail
        python3 -c 'import build, subprocess, sys; build.BUILD.mkdir(parents=True, exist_ok=True); sys.exit(subprocess.run(build._cmake_configure_args(), cwd=build.ROOT).returncode)'
        ninja -C build -j"$(nproc)" aura

    - name: Health endpoint smoke
      run: |
        set -euo pipefail
        AURA_RUNTIME_DIR=$PWD ./build/aura --health-server 18087 &
        pid=$!
        trap 'kill $pid 2>/dev/null || true' EXIT
        # Wait until the server answers (cold configure/build can delay bind).
        for i in $(seq 1 30); do
          if curl -fsS http://127.0.0.1:18087/healthz >/dev/null 2>&1; then
            break
          fi
          sleep 0.2
        done
        curl -fsS http://127.0.0.1:18087/healthz
        curl -fsS http://127.0.0.1:18087/readyz
        curl -fsS http://127.0.0.1:18087/metrics | grep -q 'aura_up 1'
