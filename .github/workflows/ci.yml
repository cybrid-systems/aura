# Aura CI — GitHub Actions
#
# Uses ghcr.io/cybrid-systems/dev:latest (GCC 16 + CMake 4.x + Ninja)

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure
      run: |
        cmake --version
        g++ --version
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --target aura -j$(nproc)

    - name: Quick smoke test
      run: echo '(+ 1 2 3)' | ./build/aura | grep -q 6

    - name: Build test_ir
      run: cmake --build build --target test_ir -j$(nproc)

    # Run each test suite individually to pinpoint failures
    - name: test smoke
      run: python3 build.py test smoke
    - name: test unit
      run: python3 build.py test unit
    - name: test integ
      run: python3 build.py test integ
    - name: test typecheck
      run: python3 build.py test typecheck
    - name: test bench
      run: python3 build.py test bench
    - name: test mutation
      run: python3 build.py test mutation
    - name: test demo
      run: python3 build.py test demo
    - name: test ai
      run: python3 build.py test ai
    - name: test bash
      run: python3 build.py test bash
