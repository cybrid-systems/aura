# Aura CI — canonical workflow (Issue #1570 path map)
#
# THIS IS THE ONLY PR/main CI entrypoint.
# There is NO `.github/ci_pipeline.yml` (that path 404s / never existed).
# Nightly / release live beside this file: nightly.yml, release.yml.
#
# Developer map: docs/test_harness_pattern.md
#   - Benchmark gate → tests/benchmark.py + ./build.py bench --strict
#     (NOT src/test/benchmark_gate.ixx)
#   - Issue tests    → tests/test_*.cpp + aura_add_issue_test +
#     tests/run_issue_tests.py (NOT src/test/test_issue_pattern.ixx)
#   - Platforms      → docs/ci-platforms.md (#1573)
#
# Wall-time layout (approx):
#   gate (~1m) ──► build-test (~12–18m → target <8m, see docs/ci-performance.md)
#                  └── final step: ./build.py bench --strict (#1569 SLO)
#   asan-build (~10m, parallel with gate+build-test) ──► asan-verify (~5m)
#   platform-gates (macOS core + Windows scripts, #1573) ── parallel after gate
#
# Issue #873/#874 CI performance: mold linker + link job pool + phase
# timings. ccache stays disabled until module-launcher producer keys
# are proven (see docs/ci-performance.md Phase 2).
# pip cache uses an exact key only (requirements-dev.txt hash).
#
# PRs skip the ASAN track; main runs the full matrix.
# Issue #675: PRs also run ubsan-smoke + security-scan;
# main adds reproducible-build verification.
# Issue #1573: macOS + Windows platform-gates (see docs/ci-platforms.md).

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AURA_BUILD_TYPE: RelWithDebInfo
  AURA_BUILD_JOBS: "0"  # 0 → use all host CPUs in build.py
  AURA_TEST_JOBS: "4"
  AURA_ISSUES_JOBS: "4"
  # Cross-run ccache caused stale-object flakes; compile fresh every job.
  CCACHE_DISABLE: 1
  # Issue #873/#874 Phase 1
  AURA_USE_MOLD: "1"
  AURA_LINK_JOBS: "4"
  NINJA_STATUS: "[%f/%t %es] "
  # Issue #1569: hard benchmark SLO gate (regression → job fail)
  AURA_CI_STRICT_BENCH: "1"

jobs:
  gate:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-dev-v1.0.4-${{ hashFiles('requirements-dev.txt') }}

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    # gate = docs --check + ruff + clang-format (full src/tests tree) + fixtures.
    # C++ format is enforced via build.py format inside gate (not a separate step).
    - name: Static checks (docs + lint + format + fixtures)
      run: python3 build.py gate

    # Issue #476: clang-tidy static analysis (subset).
    # The .clang-tidy config (repo root) whitelists the
    # modern-C++ checks that catch real bugs without too
    # much noise. We run it on a representative file set
    # rather than the entire tree — clang-tidy on a
    # 150k+ line codebase takes ~5 minutes, and the gate
    # job runs on every PR. The file list is the union
    # of the new code added by recent commits + the files
    # most likely to grow new bugs (compilers / primitives).
    # Main branch runs the full set on a longer-running
    # job (TODO: add a separate clang-tidy-full job).
    - name: Static analysis (clang-tidy subset)
      run: |
        set +e
        files=$(find src/compiler/evaluator_primitives_query_workspace.cpp \
                     src/compiler/evaluator_primitives_observability.cpp \
                     src/core/arena.ixx \
                     src/core/concepts.ixx \
                     -type f 2>/dev/null)
        if [ -z "$files" ]; then
          echo "::warning::clang-tidy: no files found (unexpected)"
          exit 0
        fi
        # HeaderFilterRegex in .clang-tidy keeps clang-tidy
        # focused on src/ + tests/. -p . provides the
        # compile_commands.json (or we fall back to a
        # warning). clang-tidy is non-blocking for now —
        # any warning produces a log line but doesn't fail
        # the gate (so the gate stays green while the
        # baseline is established). Once the warning count
        # stabilizes, promote to blocking.
        echo "$files" | xargs -I {} clang-tidy --quiet -p . {} || true
        echo "✓ clang-tidy scan complete (non-blocking; see .clang-tidy for filter)"

  build-test:
    needs: [gate]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-dev-v1.0.4-${{ hashFiles('requirements-dev.txt') }}

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    # Issue #873/#874: fast linker (mold preferred, lld fallback).
    # build.py probes mold with a trivial link; GCC 16's
    # libatomic_asneeded.so breaks some mold versions (AS_NEEDED
    # parse error) — then we auto-select lld. Install both so CI
    # always has a working fast path.
    - name: Install mold / lld (fast linkers)
      run: |
        set -e
        if ! command -v mold >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq mold || echo "::warning::mold not installed"
        fi
        if command -v mold >/dev/null 2>&1; then mold --version; fi
        # lld is the reliable fallback under GCC 16 + mold incompatibility.
        if ! command -v ld.lld >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq lld || echo "::warning::lld not installed"
        fi
        if command -v ld.lld >/dev/null 2>&1; then ld.lld --version | head -1; fi

    - name: Build & Test
      env:
        AURA_ISSUES_TIER: ${{ github.event_name == 'pull_request' && 'fast' || 'full' }}
        AURA_GIT_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
        # Issue #374: explicit AURA_RUNTIME_DIR for the AOT path.
        # find_runtime_c() (aura_jit_bridge.cpp) tries (1)
        # $AURA_RUNTIME_DIR/runtime.c, (2) walk-up from the aura
        # binary 8 levels looking for lib/runtime.c, (3) CWD-
        # relative lib/../lib/runtime.c, (4) FHS install-path
        # fallbacks (/usr/local/share/aura, /usr/share/aura,
        # /opt/aura/share). On the v1.0.4 CI image the walk-up
        # normally finds lib/runtime.c under the workspace; if
        # it ever fails (e.g. custom Docker layer with stripped
        # /proc, or a non-standard build tree depth > 8), the
        # env var below forces the lookup to a known location.
        # See docs/contributing.md §X "Runtime.c 查找策略".
        AURA_RUNTIME_DIR: ${{ github.workspace }}
      run: python3 build.py ci

    # Issue #1569: hard SLO gate for compiler pipeline benchmarks.
    # Requires AURA_CI_STRICT_BENCH=1 (workflow env). Fails the job when
    # any case exceeds ratio+absolute delta vs tests/benchmark_baseline.json.
    - name: Benchmark SLO gate (#1569)
      env:
        AURA_RUNTIME_DIR: ${{ github.workspace }}
        AURA_CI_STRICT_BENCH: "1"
      run: python3 build.py bench --strict

  # P4: S0 surface smoke — parallel with build-test (runtime gate AURA_PRIMITIVES=s0).
  # Validates metrics facade + curated suite without bulk query:*-stats / eda / security.
  # See docs/design/primitives-surface-refactor.md Phase 2b/4.
  s0-smoke:
    needs: [gate]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-dev-v1.0.4-${{ hashFiles('requirements-dev.txt') }}

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    - name: Install mold / lld (fast linkers)
      run: |
        set -e
        if ! command -v mold >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq mold || echo "::warning::mold not installed"
        fi
        if ! command -v ld.lld >/dev/null 2>&1; then
          apt-get update -qq && apt-get install -y -qq lld || echo "::warning::lld not installed"
        fi

    - name: Build
      env:
        AURA_RUNTIME_DIR: ${{ github.workspace }}
      run: python3 build.py build

    - name: Suite s0 surface smoke
      env:
        AURA_RUNTIME_DIR: ${{ github.workspace }}
      run: python3 build.py test suite-s0

    - name: engine:metrics under s0
      env:
        AURA_PRIMITIVES: s0
        AURA_RUNTIME_DIR: ${{ github.workspace }}
      run: |
        printf '%s\n' \
          '(define m (engine:metrics))' \
          '(unless (hash? m) (error "engine:metrics not hash"))' \
          '(unless (= 1 (hash-ref m "schema")) (error "schema"))' \
          '(display "s0 engine:metrics ok")' \
          '(newline)' \
          | ./build/aura

  # ASAN track — main only (saves ~8–10m on PRs; PR gate is build-test).
  # Routes through build.py --sanitizer=asan (Issue #299) so local and
  # CI build invocation stay in lockstep.
  asan-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    - name: Build with ASAN
      run: python3 build.py --sanitizer=asan build

    - name: Upload ASAN binaries
      uses: actions/upload-artifact@v7
      with:
        name: asan-binaries
        path: |
          build_asan/aura
          build_asan/test_ir
        if-no-files-found: error
        retention-days: 1

  asan-verify:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [asan-build]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - name: Download ASAN binaries
      uses: actions/download-artifact@v8
      with:
        name: asan-binaries
        path: build_asan

    - name: Restore executable bit
      run: chmod +x build_asan/aura build_asan/test_ir

    - name: Multi-session leak test
      run: |
        set +e
        ASAN_OPTIONS=detect_leaks=1:abort_on_error=0:print_stacktrace=1:exitcode=42 \
          timeout 120 ./build_asan/aura < tests/multi_session_leak_test.aura \
          > /tmp/asan-multi-session.log 2>&1
        rc=$?
        set -e
        cat /tmp/asan-multi-session.log
        if ! grep -q "✅ PASS" /tmp/asan-multi-session.log; then
          echo "::error::multi-session leak test FAILED (functional)"
          exit 1
        fi
        if [ "$rc" -ne 0 ]; then
          summary=$(grep "SUMMARY: AddressSanitizer" /tmp/asan-multi-session.log | tail -1)
          echo "::error::ASAN leak detected: $summary"
          grep "Direct leak of" /tmp/asan-multi-session.log | head -10
          exit 1
        fi
        echo "✓ No ASAN leaks detected"

    - name: Run unit tests (test_ir) under ASAN
      env:
        ASAN_OPTIONS: "detect_leaks=0:abort_on_error=1:print_stacktrace=1:halt_on_error=1"
      run: |
        python3 build.py --sanitizer=asan test unit
        echo "✓ unit tests clean under ASAN"

    - name: Run emit-binary suite (bash) under ASAN
      env:
        ASAN_OPTIONS: "detect_leaks=0:abort_on_error=1:print_stacktrace=1:halt_on_error=1"
      run: |
        AURA=$(pwd)/build_asan/aura bash tests/run-tests.sh
        echo "✓ emit-binary suite clean under ASAN"

  # Issue #675: UBSAN smoke on every PR (lighter than full ASAN track).
  ubsan-smoke:
    needs: [gate]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-dev-v1.0.4-${{ hashFiles('requirements-dev.txt') }}

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    - name: Build with UBSAN
      run: python3 build.py --sanitizer=ubsan build

    - name: Run unit tests under UBSAN
      env:
        UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
      run: |
        python3 build.py --sanitizer=ubsan test unit
        echo "✓ unit tests clean under UBSAN"

  # Issue #675: dependency + filesystem vulnerability scan + SBOM.
  security-scan:
    needs: [gate]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-dev-v1.0.4-${{ hashFiles('requirements-dev.txt') }}

    # Issue #675 follow-up: cache the Trivy vuln DB so
    # the first run downloads it once and subsequent runs
    # reuse the cache (the DB is ~30MB and takes 1-2
    # min to download on a fresh container). Without
    # this cache, the vuln scanner can hit the 4-min
    # timeout on slow CI networks.
    - uses: actions/cache@v6
      with:
        path: ~/.cache/trivy
        key: trivy-db-${{ runner.os }}-v0.72.0
        restore-keys: trivy-db-${{ runner.os }}-

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    - name: Install Trivy
      run: |
        # Issue #675 fix-up: pin to a known-available
        # release. v0.58.1 was yanked from the GitHub
        # release page (the install script downloaded a
        # 404 tarball, causing the security-scan job to
        # fail with exit 1). v0.72.0 is the latest stable
        # release (2026-06-30) with all linux/amd64
        # assets present. Update this pin when bumping
        # the Trivy minor; verify the release still
        # exists via:
        #   curl -sI https://github.com/aquasecurity/trivy/releases/download/v0.72.0/trivy_0.72.0_Linux-64bit.tar.gz
        # (302 redirect = good; 404 = yanked).
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b /usr/local/bin v0.72.0

    - name: Security scan
      run: python3 build.py security

    - name: Generate SBOM
      run: python3 build.py sbom --version=ci-${{ github.sha }}

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v7
      with:
        name: aura-sbom
        path: dist/aura-sbom.json
        if-no-files-found: error
        retention-days: 30

  # Issue #675: dual reproducible Release build verification (main only).
  reproducible-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [gate]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    env:
      SOURCE_DATE_EPOCH: "1704067200"
      CCACHE_DISABLE: 1
    steps:
    - uses: actions/checkout@v7

    - uses: actions/cache@v6
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-dev-v1.0.4-${{ hashFiles('requirements-dev.txt') }}

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    - name: Verify reproducible builds match
      run: python3 build.py repro --verify

  # Issue #677: health endpoint smoke (main only).
  deployment-health:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [gate]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.4
    steps:
    - uses: actions/checkout@v7

    - name: Install Python CI deps
      run: pip install --break-system-packages -r requirements-dev.txt

    # Only aura + test_issue_677. Full issue-test matrix is build-test's job;
    # building all_test_issue_targets here was redundant and flaked GCC
    # module dyndep scans (…aura_jit_bridge.cpp.o.ddi.i: Invalid argument).
    - name: Build aura + health test
      run: |
        set -euo pipefail
        python3 -c 'import build, subprocess, sys; build.BUILD.mkdir(parents=True, exist_ok=True); sys.exit(subprocess.run(build._cmake_configure_args(), cwd=build.ROOT).returncode)'
        ninja -C build -j"$(nproc)" aura test_issue_677

    - name: Health endpoint smoke
      run: |
        AURA_RUNTIME_DIR=$PWD ./build/aura --health-server 18087 &
        pid=$!
        sleep 1
        curl -fsS http://127.0.0.1:18087/healthz
        curl -fsS http://127.0.0.1:18087/readyz
        curl -fsS http://127.0.0.1:18087/metrics | grep -q 'aura_up 1'
        kill $pid
        ./build/test_issue_677

  # ─────────────────────────────────────────────────────────────
  # Issue #1573: multi-platform gates (Windows + macOS)
  #
  # Linux remains the production OS for:
  #   - full C++ build + issue-test matrix (build-test)
  #   - sanitizers (asan / ubsan)
  #   - benchmark SLO (bench --strict)
  #
  # This job expands coverage without duplicating the expensive
  # Linux container path:
  #   macos-latest  → Homebrew GCC 16 + cmake --preset macos-release
  #                   + aura smoke (fast) / + test_ir unit (full on main)
  #   windows-latest → Python scripts gate (gate --scripts-only)
  #                   Native MSVC C++ is NOT yet production-supported
  #                   (C++26 modules + GCC contracts; see docs/ci-platforms.md).
  #
  # fail-fast: false so one OS cannot cancel the other.
  # ─────────────────────────────────────────────────────────────
  platform-gates:
    name: platform (${{ matrix.os }} / ${{ matrix.kind }})
    needs: [gate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            kind: macos-core
          - os: windows-latest
            kind: windows-scripts
    env:
      # PR → fast; push to main → full (mirrors build-test tier split).
      AURA_PLATFORM_TIER: ${{ github.event_name == 'pull_request' && 'fast' || 'full' }}
      AURA_USE_MOLD: "0"
      CCACHE_DISABLE: "1"
    steps:
    - uses: actions/checkout@v7

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: requirements-dev.txt

    - name: Install Python CI deps
      run: python -m pip install -r requirements-dev.txt

    # ── macOS: core evaluator build + smoke (#1573) ────────────
    - name: macOS — install Homebrew toolchain (GCC 16 + CMake + Ninja)
      if: matrix.kind == 'macos-core'
      run: |
        set -euo pipefail
        brew update
        # gcc@16: C++26 modules + -fcontracts (matches Linux CI toolchain class)
        # cmake: need 4.3+ for CMAKE_EXPERIMENTAL_CXX_IMPORT_STD UUID in CMakeLists
        # ninja: preset generator
        brew install gcc@16 cmake ninja
        echo "=== toolchain ==="
        cmake --version | head -1
        g++-16 --version | head -1
        ninja --version

    - name: macOS — configure (cmake --preset macos-release)
      if: matrix.kind == 'macos-core'
      run: |
        set -euo pipefail
        cmake --preset macos-release
        echo "configure OK (binaryDir=build-mac)"

    - name: macOS — build aura (fast + full)
      if: matrix.kind == 'macos-core'
      run: |
        set -euo pipefail
        jobs=$(sysctl -n hw.ncpu 2>/dev/null || echo 4)
        cmake --build build-mac -j"$jobs" --target aura
        test -x build-mac/aura
        echo "aura binary OK"

    - name: macOS — REPL smoke
      if: matrix.kind == 'macos-core'
      env:
        AURA_RUNTIME_DIR: ${{ github.workspace }}
      run: |
        set -euo pipefail
        out=$(printf '%s\n' '(+ 1 2)' | ./build-mac/aura)
        echo "repl out: $out"
        echo "$out" | grep -q '3'
        echo "✓ macOS REPL smoke (+ 1 2) → 3"

    - name: macOS — unit tests (full tier / main only)
      if: matrix.kind == 'macos-core' && env.AURA_PLATFORM_TIER == 'full'
      env:
        AURA_RUNTIME_DIR: ${{ github.workspace }}
        AURA_BUILD_DIR: ${{ github.workspace }}/build-mac
      run: |
        set -euo pipefail
        jobs=$(sysctl -n hw.ncpu 2>/dev/null || echo 4)
        # test_ir is the C++ unit suite; optional if target missing on slim presets.
        if cmake --build build-mac -j"$jobs" --target test_ir; then
          ./build-mac/test_ir
          echo "✓ macOS test_ir unit suite"
        else
          echo "::warning::test_ir target failed to build on macOS — core aura smoke still required"
          exit 1
        fi

    - name: macOS — platform summary
      if: matrix.kind == 'macos-core'
      run: |
        echo "### macOS platform gate (#1573)" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| Item | Status |" >> "$GITHUB_STEP_SUMMARY"
        echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
        echo "| tier | \`${{ env.AURA_PLATFORM_TIER }}\` |" >> "$GITHUB_STEP_SUMMARY"
        echo "| preset | macos-release → build-mac |" >> "$GITHUB_STEP_SUMMARY"
        echo "| REPL smoke | pass |" >> "$GITHUB_STEP_SUMMARY"
        echo "| sanitizers / bench SLO | Linux only (see build-test / asan / ubsan) |" >> "$GITHUB_STEP_SUMMARY"

    # ── Windows: scripts / static gate (#1573) ─────────────────
    - name: Windows — scripts-only gate (no clang-format / no native C++)
      if: matrix.kind == 'windows-scripts'
      shell: bash
      env:
        AURA_GATE_SCRIPTS_ONLY: "1"
      run: |
        set -euo pipefail
        python build.py gate --scripts-only
        echo "✓ Windows scripts gate clean"

    - name: Windows — pure-Python gate unit tests (full tier)
      if: matrix.kind == 'windows-scripts' && env.AURA_PLATFORM_TIER == 'full'
      shell: bash
      run: |
        set -euo pipefail
        python tests/test_benchmark_gate.py
        python tests/test_test_binding_gate.py
        python tests/test_primitive_surface_gate.py
        echo "✓ Windows full-tier Python unit gates"

    - name: Windows — platform summary
      if: matrix.kind == 'windows-scripts'
      shell: bash
      run: |
        echo "### Windows platform gate (#1573)" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| Item | Status |" >> "$GITHUB_STEP_SUMMARY"
        echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
        echo "| tier | \`${{ env.AURA_PLATFORM_TIER }}\` |" >> "$GITHUB_STEP_SUMMARY"
        echo "| C++ native MSVC | **not production-supported** (C++26 modules + GCC contracts) |" >> "$GITHUB_STEP_SUMMARY"
        echo "| scripts gate | \`build.py gate --scripts-only\` |" >> "$GITHUB_STEP_SUMMARY"
        echo "| sanitizers / bench SLO | Linux only |" >> "$GITHUB_STEP_SUMMARY"
