# Aura CI

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:v1.0.0

    steps:
    - uses: actions/checkout@v4

    - name: Build & Core Tests
      run: python3 build.py check

    - name: Full Fuzz (--quick)
      run: python3 build.py test fuzz

    - name: Regression
      run: python3 build.py test regression
