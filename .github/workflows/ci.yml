# Aura CI

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cybrid-systems/dev:latest

    steps:
    - uses: actions/checkout@v4

    - name: Build & Test
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        cmake --build build --target aura -j$(nproc)
        cmake --build build --target test_ir -j$(nproc)
        python3 build.py test
